# SPA xizmati — barcha yo'llar index.html ga yo'naltiriladi (React Router)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Statik aktivlarni keshlash
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router uchun fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
